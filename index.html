<!DOCTYPE html>
<html>
<head>
<title>System Lock Prank</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  overflow:hidden;
}

#btn{
  position:absolute;
  padding:15px 25px;
  font-size:18px;
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
}
</style>
</head>

<body>

<h3 style="text-align:center;">⚠️ SYSTEM LOCKED</h3>
<p style="text-align:center;">Catch button to stop system</p>

<button id="btn">STOP ME</button>

<button style="display:none" onclick="playSound()">hidden</button>

<audio id="sound" preload="auto">
  <source src="bakra_bo_bo_booo(128k).mp3" type="audio/mpeg">
</audio>

<script>
let btn = document.getElementById("btn");
let sound = document.getElementById("sound");

// 🔘 moving button
let move = setInterval(() => {
  btn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  btn.style.top = Math.random() * (window.innerHeight - 80) + "px";
}, 120);

// 🔊 wrong touch anywhere
document.body.addEventListener("click", function(e){
  if(e.target.id !== "btn"){
    sound.currentTime = 0;
    sound.play().catch(()=>{});

    if(navigator.vibrate){
      navigator.vibrate([200,100,200]);
    }

    alert("⚠️ Wrong touch detected!");
  }
});

// 🛑 correct button stops prank
btn.onclick = function(e){
  e.stopPropagation();

  clearInterval(move);
  sound.pause();

  document.body.innerHTML =
    "<h1 style='color:#00ff00;text-align:center;margin-top:200px'>✔ PRANK STOPPED</h1>";
};
</script>

</body>
</html>
